  <!--

  Exercício 1

Resposta:
Sim, o elemento ficou maior que 200px. Isso acontece porque, por padrão, o CSS considera o width apenas como o tamanho do conteúdo.
 O padding e a border são somados fora dessa largura, aumentando o tamanho total da caixa.

 
Exercício 2

Resposta:
Com box-sizing: border-box, o tamanho total da caixa continua sendo 200px. Isso acontece porque agora o padding e a border passam a fazer parte da largura definida,
 não sendo mais somados por fora.

Exercício 3

Resposta:
O margin é o responsável por afastar os elementos entre si, criando espaço externo. Já o padding apenas aumenta o espaço interno da caixa, 
afastando o conteúdo da borda, mas não move a caixa em relação às outras.

Exercício 4

Resposta:
O tamanho total da caixa é 250px. Isso porque somamos:
200px (conteúdo) + 40px (padding) + 10px (borda) = 250px.

Exercício 5

Resposta:
Com box-sizing: border-box, o tamanho total passa a ser 200px. O conteúdo interno é reduzido para que padding e borda caibam dentro da largura definida.


Exercício 6

Resposta:
O margin: 0 auto não funciona sem definir uma largura porque o elemento, por padrão, ocupa 100% do espaço disponível. Sem espaço sobrando, não há como centralizar.


Exercício 7

Resposta:
O espaço entre os elementos é 20px, e não 40px. Isso ocorre por causa do colapso de margem, onde margens verticais se juntam e o navegador considera apenas a maior delas. -->
